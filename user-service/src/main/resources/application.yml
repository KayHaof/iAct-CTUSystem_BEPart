server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:database}
    password: ${MYSQL_PASSWORD:password1}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8088/realms/myRealm/protocol/openid-connect/certs
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gcp:
      storage:
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  keycloak:
    token-uri: http://localhost:8088/realms/myRealm/protocol/openid-connect/token
keycloak-admin-password: ${KEYCLOAK_ADMIN_PASSWORD:myKeycloak123@}

