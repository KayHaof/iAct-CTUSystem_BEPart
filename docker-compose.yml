services:
  my-db:
    image: mysql:8.0
    container_name: mysql_database
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password1}
      - MYSQL_USER=${MYSQL_USER:-database}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password1}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-multiple-db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-password1}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    container_name: baeldung-keycloak.openid-provider
    image: keycloak/keycloak:25.0.1
    command:
      - start-dev
      - --import-realm
    ports:
      - "8088:8080"
    depends_on:
      my-db:
        condition: service_healthy
    volumes:
      - ./keycloak/:/opt/keycloak/data/import/:ro
      - ./keycloak/themes/iAct-themes:/opt/keycloak/themes/iAct-themes:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-123456}

      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql_database:3306/keycloak?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      KC_DB_USERNAME: ${MYSQL_USER:-database}
      KC_DB_PASSWORD: ${MYSQL_PASSWORD:-password1}
      KC_DB_WAIT: "10"
      KC_DB_POOL_MIN: "1"
      KC_DB_POOL_SIZE: "10"

      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_SPI_STATIC_MAX_AGE: "-1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - microservices-net
    restart: on-failure

  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: my-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@my-kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://my-kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net
volumes:
  mysql_data:
  redis_data:
  kafka_apache_data:
    driver: local

networks:
  microservices-net:
    driver: bridge