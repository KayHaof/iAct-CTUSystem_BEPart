server:
  port: 8084

spring:
  application:
    name: credit-service
  datasource:
    url: jdbc:mysql://localhost:3306/my_database?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:8088/realms/myRealm
        jwk-set-uri: http://localhost:8088/realms/myRealm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true

cloudinary:
  cloud-name: dhjamvg6j
  api-key: 237733137343564
  api-secret: ${api_secret}